name: Daily Stock Ingestion Pipeline

on:
  schedule:
    # Run 3 times a day, spaced 8 hours apart (2:00 AM, 10:00 AM, 6:00 PM UTC)
    # This corresponds to 7:30 AM, 3:30 PM, 11:30 PM Indian Standard Time (IST)
    - cron: "0 2,10,18 * * *"
  workflow_dispatch:
    # Allows manual trigger of the pipeline from the GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt

      - name: Create Logs Directory
        run: mkdir -p Backend/logs

      - name: Run Master Ingestion Runner
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORP_ACT_LOOKAHEAD_DAYS: ${{ secrets.CORP_ACT_LOOKAHEAD_DAYS || 90 }}
        # Runs the pipeline. If it fails, it retries up to 2 times (3 total attempts) with 30s delays.
        run: |
          n=0
          until [ "$n" -ge 3 ]
          do
            python Backend/main.py && break
            n=$((n+1))
            if [ "$n" -lt 3 ]; then
              echo "Pipeline run failed. Retrying in 30 seconds (Attempt $((n+1))/3)..."
              sleep 30
            else
              echo "Pipeline run failed after 3 attempts."
              exit 1
            fi
          done

      - name: Upload Ingestion Log Files
        if: always() # Ensure logs are uploaded even if some scripts fail
        uses: actions/upload-artifact@v4
        with:
          name: ingestion-logs-${{ github.run_id }}
          path: Backend/logs/
          retention-days: 30
